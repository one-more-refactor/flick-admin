server {
    listen 80;
    server_name _;

    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # nginx add_header does NOT inherit into locations that set their own,
    # so the security trio is repeated wherever add_header appears.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    root /usr/share/nginx/html;
    index index.html;

    # hashed assets are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # the panel talks to the flick API through this same origin
    location /api/ {
        proxy_pass http://flick-backend:8484;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Robots-Tag "noindex";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }
}
